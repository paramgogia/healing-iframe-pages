<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Same origin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        main { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        iframe { width: 100%; height: 100vh; border: 1px solid; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,.1); overflow: hidden; }
    </style>
</head>
<body>
    <main>
        <!-- Same-origin: inner page loaded relative to THIS page's origin. Keep llm-html-form.html beside this file. -->
        <iframe id="iframe" src="./llm-html-form.html" frameborder="0"></iframe>
    </main>
</body>
</html>
