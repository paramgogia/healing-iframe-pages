<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Cross origin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        main { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        iframe { width: 100%; height: 100vh; border: 1px solid; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,.1); overflow: hidden; }
        @media (max-width: 768px) { iframe { height: 100vh; } }
    </style>
</head>
<body>
    <main>
        <iframe id="iframe" width="1000" height="800" src="" frameborder="0"></iframe>
    </main>
    <script>
        // CROSS-ORIGIN REQUIREMENT: the inner page MUST be served from a DIFFERENT origin
        // (different domain/subdomain) than THIS wrapper, or it is not truly cross-origin.
        // Set this to a SECOND host that also serves the fresh llm-html-form.html.
        // e.g. a second Lovable app, or the existing github.io copy (refreshed).
        const CROSS_ORIGIN_BASE = 'https://raw.githack.com/paramgogia/healing-iframe-pages/main';
        document.getElementById('iframe').src = CROSS_ORIGIN_BASE + '/llm-html-form.html';
    </script>
</body>
</html>
